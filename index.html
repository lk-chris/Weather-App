<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=League+Spartan:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <title>Frontend Mentor | Weather app</title>

  </style>
</head>
<body>

  <header>
    <img class="logo" src="/assets/images/logo.svg" alt="">
    <span class="units-btn">
      <img src="/assets/images/icon-units.svg" alt="">
      <p>Units</p>
      <img src="/assets/images/icon-dropdown.svg" alt="">
    </span>
  </header>

  <section class="welcome">
    <h1>How's the sky looking today?</h1>
    <div class="search">
      <img src="/assets/images/icon-search.svg" alt="">
      <input class="search-input" type="text" id="search-bar" placeholder="Search for a place...">
      <button>Search</button>
    </div>
  </section>
  <script src="index.js"></script>
</body>
</html>
